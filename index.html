<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="meta.pageTitle">XADS | Link Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:FILL@0..1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-one" aria-hidden="true"></div>
    <div class="bg-orb orb-two" aria-hidden="true"></div>

    <main class="page-shell">
      <section class="profile-card">
        <header class="profile-header">
          <div class="avatar-wrap">
            <img
              src="https://cdn1.telesco.pe/file/j0_424ji2gYTWOviO8aDB5ptF2jCodbNnQ7WH4ztdQarFCAsTT9NsZgXw5qPSdSTcOGg7iUi6QlODORKeo_OMthrl46ATng7M7GHH-0Ph71vFzUmf-yZS1w3GbvVRIB6cn_GXWkrVpBOnIq9PWkJh6LaOilO-KtZTHz5idz458-6exdy5ZXE5asDMCZTk7KHfCa0qRM1zac_ii-UQdYoUxwbkfufoBM2eb57TqBvCd22fOxNUEB996t3DF2qTX5p2Iqg0X0uLivRGeIa_VDExujGimVIpZdSPO5RB6OA48QrMkNbm33YAT4mFb3BSHz7CdovWT6pQvAmjkJyx9L0pQ.jpg"
              alt="Profile photo"
              data-i18n-attr="alt:profile.avatarAlt"
              class="avatar"
            />
            <span class="badge">NEW</span>
          </div>
          <h1>@MyWifeAndYou</h1>
          <p class="subtitle" data-i18n="profile.subtitle">
            All my platforms and premium content in one link
          </p>
          <div class="meta-row">
            <span class="meta-pill" data-i18n-attr="aria-label:profile.verified">
              <span class="material-symbols-outlined">verified</span>
              <span data-i18n="profile.verified">Verified</span>
            </span>
            <span class="meta-pill" data-i18n-attr="aria-label:profile.followers">
              <span class="material-symbols-outlined">groups</span>
              <span data-i18n="profile.followers">487,3K Followers</span>
            </span>
          </div>
        </header>

        <a class="vip-btn" href="https://example.com/vip" target="_blank" rel="noreferrer">
          <span class="material-symbols-outlined">bolt</span>
          <span data-i18n="cta.vip">Enter VIP Access</span>
        </a>

        <section
          class="affiliate-banners"
          id="affiliateBanners"
          aria-label="Affiliate banners"
          data-i18n-attr="aria-label:banners.aria"
        ></section>

        <div class="quick-actions">
          <button type="button" class="action-btn" id="copyBtn">
            <span class="material-symbols-outlined">content_copy</span>
            <span data-i18n="actions.copy">Copy Link</span>
          </button>
          <button type="button" class="action-btn" id="shareBtn">
            <span class="material-symbols-outlined">share</span>
            <span data-i18n="actions.share">Share</span>
          </button>
        </div>

        <p class="status-text" id="statusText" aria-live="polite"></p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
